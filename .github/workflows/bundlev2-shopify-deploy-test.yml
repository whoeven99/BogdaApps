# bundleV2：使用 test 配置执行 shopify app deploy，并触发 Render 测试环境部署。
# 所需 GitHub Environment（如 TestEnvGithubConfig）下的 Secrets：
#   SHOPIFY_CLI_PARTNERS_TOKEN
#   RENDER_API_KEY / RENDER_APIKEY、RENDER_SERVICE_ID（按你 workflow 里实际引用）
# 说明：Prisma Migrate CLI 在 provider=sqlite 下只接受 file: 的 DATABASE_URL，不能对 Turso 用 prisma migrate deploy；
# Turso 结构变更请本地 migrate dev 生成 SQL 后，用 Turso CLI 等方式执行 prisma/migrations/*/migration.sql。
name: bundleV2 – Shopify App Deploy (Test)

on:
  push:
    branches:
      - allen
  workflow_dispatch:

defaults:
  run:
    working-directory: bundleV2

jobs:
  deploy_shopify:
    name: Shopify app deploy (test.toml)
    runs-on: ubuntu-latest
    environment: CommonShopifyRenderConfig

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # @shopify/cli@latest 需要 module.enableCompileCache（Node 22+）
          node-version: "22"
          cache: npm
          cache-dependency-path: bundleV2/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Shopify CLI
        run: npm install -g @shopify/cli@latest

      - name: Deploy
        env:
          SHOPIFY_CLI_PARTNERS_TOKEN: ${{ secrets.SHOPIFY_CLI_PARTNERS_TOKEN }}
          # 与 bundleV2/shopify.app.test.toml 中 client_id 一致
          SHOPIFY_API_KEY: ab25ea895c6df574ae9ff70e9c7731c5
        run: shopify app deploy -c shopify.app.test.toml --allow-updates --allow-deletes

  deploy_render:
    name: Trigger Render deploy (Test)
    runs-on: ubuntu-latest
    environment: CommonShopifyRenderConfig

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # 与本次要部署的代码一致；Render Create Deploy 对 branch 支持不可靠，下面用 commitId 触发
          ref: ${{ github.ref }}

      - name: Deploy to Render Test
        id: trigger_render
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_APIKEY }}
          RENDER_SERVICE_ID: srv-d72ffhdm5p6s73d0pa4g
        run: |
          COMMIT="$(git rev-parse HEAD)"
          echo "Triggering Render deploy for commit: $COMMIT ($(git log -1 --oneline))"
          RESPONSE=$(curl -s -o response.json -w "%{http_code}" -X POST "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"commitId\": \"$COMMIT\"}")
          if [ "$RESPONSE" -eq 200 ] || [ "$RESPONSE" -eq 201 ]; then
            echo "Deploy to test Render triggered successfully. HTTP status: $RESPONSE"
            DEPLOY_ID=$(python3 -c "import json;print(json.load(open('response.json')).get('id',''))")
            DEPLOY_URL="https://dashboard.render.com/web/${RENDER_SERVICE_ID}/deploys/${DEPLOY_ID}"
            echo "deploy_id=${DEPLOY_ID}" >> "$GITHUB_OUTPUT"
            echo "deploy_url=${DEPLOY_URL}" >> "$GITHUB_OUTPUT"
            echo "Render deploy: ${DEPLOY_URL}"
          else
            echo "Failed to trigger deployment. HTTP status: $RESPONSE"
            cat response.json
            exit 1
          fi

      - name: Wait for Render Test deploy result
        id: wait_render
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_APIKEY }}
          RENDER_SERVICE_ID: srv-d72ffhdm5p6s73d0pa4g
          DEPLOY_ID: ${{ steps.trigger_render.outputs.deploy_id }}
        run: |
          if [ -z "$DEPLOY_ID" ]; then
            echo "Render deploy id missing."
            exit 1
          fi

          MAX_WAIT_SECONDS=900
          SLEEP_SECONDS=20
          ELAPSED=0

          while [ "$ELAPSED" -lt "$MAX_WAIT_SECONDS" ]; do
            HTTP_CODE=$(curl -s -o deploy_status.json -w "%{http_code}" \
              -H "Authorization: Bearer $RENDER_API_KEY" \
              "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys/$DEPLOY_ID")

            if [ "$HTTP_CODE" -ne 200 ]; then
              echo "Failed to query Render deploy status. HTTP status: $HTTP_CODE"
              cat deploy_status.json
              sleep "$SLEEP_SECONDS"
              ELAPSED=$((ELAPSED + SLEEP_SECONDS))
              continue
            fi

            FINAL_STATUS=$(python3 -c "import json;print(json.load(open('deploy_status.json')).get('status',''))")
            echo "Render deploy status: $FINAL_STATUS (elapsed ${ELAPSED}s)"

            case "$FINAL_STATUS" in
              live)
                echo "final_status=$FINAL_STATUS" >> "$GITHUB_OUTPUT"
                exit 0
                ;;
              build_failed|update_failed|canceled|failed)
                echo "final_status=$FINAL_STATUS" >> "$GITHUB_OUTPUT"
                echo "Deploy failed. Logs: ${{ steps.trigger_render.outputs.deploy_url }}"
                exit 1
                ;;
            esac

            sleep "$SLEEP_SECONDS"
            ELAPSED=$((ELAPSED + SLEEP_SECONDS))
          done

          echo "final_status=timeout" >> "$GITHUB_OUTPUT"
          exit 1
