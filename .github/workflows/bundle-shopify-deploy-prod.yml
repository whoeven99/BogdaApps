name: bundleV2 – Shopify App Deploy (Prod)

on:
  push:
    branches:
      - master
  workflow_dispatch:

defaults:
  run:
    working-directory: bundleV2

jobs:
  deploy_shopify:
    name: Shopify app deploy (prod.toml)
    runs-on: ubuntu-latest
    environment: CommonShopifyRenderConfig

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: yarn
          cache-dependency-path: bundleV2/yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Install Shopify CLI
        run: npm install -g @shopify/cli@latest

      - name: Deploy
        env:
          SHOPIFY_CLI_PARTNERS_TOKEN: ${{ secrets.SHOPIFY_CLI_PARTNERS_TOKEN }}
          # 与 bundleV2/shopify.app.prod.toml 中 client_id 一致
          SHOPIFY_API_KEY: bfc13ad696f2a8d2a77ba6eee1e26966
        run: shopify app deploy -c shopify.app.prod.toml -f

  deploy_render:
    name: Trigger Render deploy (PROD)
    runs-on: ubuntu-latest
    environment: CommonShopifyRenderConfig

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # 与本次要部署的代码一致；Render Create Deploy 对 branch 支持不可靠，下面用 commitId 触发
          ref: ${{ github.ref }}

      - name: Deploy to Render PROD
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_APIKEY }}
          RENDER_SERVICE_ID: srv-d5tgbkcr85hc73f7s48g
        run: |
          COMMIT="$(git rev-parse HEAD)"
          echo "Triggering Render deploy for commit: $COMMIT ($(git log -1 --oneline))"
          RESPONSE=$(curl -s -o response.json -w "%{http_code}" -X POST "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"commitId\": \"$COMMIT\"}")
          if [ "$RESPONSE" -eq 200 ] || [ "$RESPONSE" -eq 201 ]; then
            echo "Deploy to prod Render triggered successfully. HTTP status: $RESPONSE"
          else
            echo "Failed to trigger deployment. HTTP status: $RESPONSE"
            cat response.json
            exit 1
          fi

      - name: Notify Feishu on Render deploy success
        if: ${{ success() }}
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          PR_TITLE: ${{ github.event.pull_request.title || '' }}
          PR_BODY: ${{ github.event.pull_request.body || '' }}
        run: |
          if [ -z "$FEISHU_WEBHOOK_URL" ]; then
            echo "FEISHU_WEBHOOK_URL is not set, skip Feishu notification."
            exit 0
          fi

          MESSAGE="Bundle PROD deploy 发布中, by ${GITHUB_ACTOR}.\n发布内容：${PR_BODY}\n查看状态: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          PAYLOAD=$(printf '{"msg_type":"text","content":{"text":"%s"}}' "$MESSAGE")

          curl -sS -X POST "$FEISHU_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
