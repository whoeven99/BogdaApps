name: bundleV2 – Shopify App Deploy (Prod)

on:
  push:
    branches:
      - master
  workflow_dispatch:

defaults:
  run:
    working-directory: bundleV2

jobs:
  deploy_shopify:
    name: Shopify app deploy (prod.toml)
    runs-on: ubuntu-latest
    environment: CommonShopifyRenderConfig

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: yarn
          cache-dependency-path: bundleV2/yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Install Shopify CLI
        run: npm install -g @shopify/cli@latest

      - name: Deploy
        env:
          SHOPIFY_CLI_PARTNERS_TOKEN: ${{ secrets.SHOPIFY_CLI_PARTNERS_TOKEN }}
          # 与 bundleV2/shopify.app.prod.toml 中 client_id 一致
          SHOPIFY_API_KEY: bfc13ad696f2a8d2a77ba6eee1e26966
        run: shopify app deploy -c shopify.app.prod.toml -f

  deploy_render:
    name: Trigger Render deploy (PROD)
    runs-on: ubuntu-latest
    environment: CommonShopifyRenderConfig

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # 与本次要部署的代码一致；Render Create Deploy 对 branch 支持不可靠，下面用 commitId 触发
          ref: ${{ github.ref }}

      - name: Deploy to Render PROD
        id: trigger_render
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_APIKEY }}
          RENDER_SERVICE_ID: srv-d5tgbkcr85hc73f7s48g
        run: |
          COMMIT="$(git rev-parse HEAD)"
          echo "Triggering Render deploy for commit: $COMMIT ($(git log -1 --oneline))"
          RESPONSE=$(curl -s -o response.json -w "%{http_code}" -X POST "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"commitId\": \"$COMMIT\"}")
          if [ "$RESPONSE" -eq 200 ] || [ "$RESPONSE" -eq 201 ]; then
            echo "Deploy to prod Render triggered successfully. HTTP status: $RESPONSE"
            DEPLOY_ID=$(python3 -c "import json;print(json.load(open('response.json')).get('id',''))")
            DEPLOY_STATUS=$(python3 -c "import json;print(json.load(open('response.json')).get('status',''))")
            DEPLOY_URL="https://dashboard.render.com/web/${RENDER_SERVICE_ID}/deploys/${DEPLOY_ID}"
            echo "deploy_id=${DEPLOY_ID}" >> "$GITHUB_OUTPUT"
            echo "initial_status=${DEPLOY_STATUS}" >> "$GITHUB_OUTPUT"
            echo "deploy_url=${DEPLOY_URL}" >> "$GITHUB_OUTPUT"
            echo "Render deploy id: ${DEPLOY_ID}, status: ${DEPLOY_STATUS}"
          else
            echo "Failed to trigger deployment. HTTP status: $RESPONSE"
            cat response.json
            exit 1
          fi

      - name: Wait for Render PROD deploy result
        id: wait_render
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_APIKEY }}
          RENDER_SERVICE_ID: srv-d5tgbkcr85hc73f7s48g
          DEPLOY_ID: ${{ steps.trigger_render.outputs.deploy_id }}
        run: |
          if [ -z "$DEPLOY_ID" ]; then
            echo "Render deploy id missing."
            exit 1
          fi

          MAX_WAIT_SECONDS=600
          SLEEP_SECONDS=20
          ELAPSED=0
          FINAL_STATUS="unknown"

          while [ "$ELAPSED" -lt "$MAX_WAIT_SECONDS" ]; do
            HTTP_CODE=$(curl -s -o deploy_status.json -w "%{http_code}" \
              -H "Authorization: Bearer $RENDER_API_KEY" \
              "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys/$DEPLOY_ID")

            if [ "$HTTP_CODE" -ne 200 ]; then
              echo "Failed to query Render deploy status. HTTP status: $HTTP_CODE"
              cat deploy_status.json
              sleep "$SLEEP_SECONDS"
              ELAPSED=$((ELAPSED + SLEEP_SECONDS))
              continue
            fi

            FINAL_STATUS=$(python3 -c "import json;print(json.load(open('deploy_status.json')).get('status',''))")
            echo "Render deploy status: $FINAL_STATUS (elapsed ${ELAPSED}s)"

            case "$FINAL_STATUS" in
              live)
                echo "final_status=$FINAL_STATUS" >> "$GITHUB_OUTPUT"
                exit 0
                ;;
              build_failed|update_failed|canceled|failed)
                echo "final_status=$FINAL_STATUS" >> "$GITHUB_OUTPUT"
                exit 1
                ;;
            esac

            sleep "$SLEEP_SECONDS"
            ELAPSED=$((ELAPSED + SLEEP_SECONDS))
          done

          echo "Timed out waiting Render deploy result."
          echo "final_status=timeout" >> "$GITHUB_OUTPUT"
          exit 1

      - name: Notify Feishu on Render deploy success
        if: ${{ success() }}
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          RENDER_DEPLOY_URL: ${{ steps.trigger_render.outputs.deploy_url }}
          RENDER_FINAL_STATUS: ${{ steps.wait_render.outputs.final_status }}
        run: |
          if [ -z "$FEISHU_WEBHOOK_URL" ]; then
            echo "FEISHU_WEBHOOK_URL is not set, skip Feishu notification."
            exit 0
          fi

          COMMIT_SUBJECT="$(git log -1 --pretty=%s)"
          COMMIT_BODY="$(git log -1 --pretty=%b)"
          RELEASE_CONTENT="Commit: ${COMMIT_SUBJECT}"
          if [ -n "$COMMIT_BODY" ]; then
            RELEASE_CONTENT="${RELEASE_CONTENT}\n描述: ${COMMIT_BODY}"
          fi

          MESSAGE="Bundle PROD deploy 成功, by ${GITHUB_ACTOR}.\n最终状态: ${RENDER_FINAL_STATUS}\n发布内容：${COMMIT_BODY}"
          PAYLOAD=$(printf '{"msg_type":"text","content":{"text":"%s"}}' "$MESSAGE")

          curl -sS -X POST "$FEISHU_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"

      - name: Notify Feishu on Render deploy failure
        if: ${{ failure() }}
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          RENDER_DEPLOY_URL: ${{ steps.trigger_render.outputs.deploy_url }}
          RENDER_FINAL_STATUS: ${{ steps.wait_render.outputs.final_status }}
        run: |
          if [ -z "$FEISHU_WEBHOOK_URL" ]; then
            echo "FEISHU_WEBHOOK_URL is not set, skip Feishu notification."
            exit 0
          fi

          MESSAGE="Bundle PROD deploy 失败, by ${GITHUB_ACTOR}.\n最终状态: ${RENDER_FINAL_STATUS}\nRender: ${RENDER_DEPLOY_URL}\nRun: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          PAYLOAD=$(printf '{"msg_type":"text","content":{"text":"%s"}}' "$MESSAGE")

          curl -sS -X POST "$FEISHU_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
