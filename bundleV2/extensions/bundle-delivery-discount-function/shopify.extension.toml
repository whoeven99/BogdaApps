handle = "bundle-delivery-discount-function"

uid = "a8f3c2d1-4e5b-6a7c-8d9e-0f1a2b3c4d5e"

type = "function"
description = "100% shipping discount for progressive gift (free_shipping) tiers; reads shop metafield ciwi_bundle / ciwi-bundle-offers."

[[extensions.targeting]]
target = "cart.delivery-options.discounts.generate.run"
