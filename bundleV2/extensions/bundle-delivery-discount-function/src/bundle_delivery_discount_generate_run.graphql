query CartDeliveryDiscountInput {
  triggeringDiscountCode
  cart {
    buyerIdentity {
      isAuthenticated
      customer {
        numberOfOrders
        amountSpent {
          amount
        }
        hasTags(tags: ["vip", "high_aov", "subscription_active", "bundle_buyer", "repeat_buyer", "high_intent"]) {
          tag
          hasTag
        }
      }
    }
    lines {
      quantity
      sellingPlanAllocation {
        sellingPlan {
          id
        }
      }
      bundleTierProp: attribute(key: "__ciwi_bundle_tier") {
        value
      }
      bundleOfferProp: attribute(key: "__ciwi_bundle_offer_id") {
        value
      }
      merchandise {
        __typename
        ... on ProductVariant {
          id
          product {
            id
          }
        }
      }
      cost {
        amountPerQuantity {
          amount
        }
      }
    }
    deliveryGroups {
      deliveryOptions {
        handle
        cost {
          amount
        }
        deliveryMethodType
      }
    }
  }
  localization {
    country {
      isoCode
    }
    market {
      id
    }
  }
  discount {
    discountClasses
    # 分片：offers + offers-1（各 <10KB），运行时合并。需与 OFFER_SHARD_KEYS 一致。
    offersFromDiscountOwner: metafield(namespace: "$app:ciwi_bundle", key: "offers") {
      jsonValue
    }
    offersShard1: metafield(namespace: "$app:ciwi_bundle", key: "offers-1") {
      jsonValue
    }
  }
}
