query CartDeliveryDiscountInput {
  cart {
    lines {
      quantity
      bundleTierProp: attribute(key: "__ciwi_bundle_tier") {
        value
      }
      bundleOfferProp: attribute(key: "__ciwi_bundle_offer_id") {
        value
      }
      merchandise {
        __typename
        ... on ProductVariant {
          id
          product {
            id
          }
        }
      }
      cost {
        amountPerQuantity {
          amount
        }
      }
    }
    deliveryGroups {
      deliveryOptions {
        handle
        cost {
          amount
        }
        deliveryMethodType
      }
    }
  }
  shop {
    bundleEnabledShop: metafield(namespace: "ciwi_bundle", key: "ciwi-bundle-enabled") {
      jsonValue
    }
    offersFn: metafield(namespace: "ciwi_bundle", key: "ciwi-bundle-offers-fn") {
      jsonValue
    }
  }
  localization {
    market {
      id
    }
  }
  discount {
    discountClasses
  }
}
