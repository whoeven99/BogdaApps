query CartDeliveryDiscountInput {
  cart {
    cost {
      subtotalAmount {
        amount
      }
    }
    lines {
      id
      quantity
      bundleTierProp: attribute(key: "__ciwi_bundle_tier") {
        key
        value
      }
      bundleOfferProp: attribute(key: "__ciwi_bundle_offer_id") {
        key
        value
      }
      merchandise {
        __typename
        ... on ProductVariant {
          id
          product {
            id
          }
        }
      }
      cost {
        amountPerQuantity {
          amount
        }
      }
    }
    deliveryGroups {
      id
      deliveryOptions {
        handle
        title
        cost {
          amount
        }
        deliveryMethodType
      }
    }
  }
  shop {
    offersFn: metafield(namespace: "ciwi_bundle", key: "ciwi-bundle-offers-fn") {
      jsonValue
      value
      type
    }
    offersStore: metafield(namespace: "ciwi_bundle", key: "ciwi-bundle-offers") {
      jsonValue
      value
      type
    }
  }
  localization {
    market {
      id
    }
  }
  discount {
    discountClasses
    offersDiscountOwner: metafield(namespace: "$app:ciwi_bundle", key: "offers") {
      jsonValue
      value
      type
    }
  }
}
