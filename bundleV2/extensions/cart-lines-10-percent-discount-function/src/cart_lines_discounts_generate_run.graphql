query CartInput {
  cart {
    lines {
      id
      quantity
      cost {
        amountPerQuantity {
          amount
        }
      }
      merchandise {
        __typename
      }
    }
  }
  shop {
    metafield(namespace: "ciwi_bundle", key: "ciwi-bundle-offers") {
      jsonValue
      value
      type
    }
  }
  discount {
    discountClasses
  }
}
