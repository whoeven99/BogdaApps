query CartInput {
  triggeringDiscountCode
  cart {
    buyerIdentity {
      isAuthenticated
      customer {
        numberOfOrders
        amountSpent {
          amount
        }
        hasTags(tags: ["vip", "high_aov", "subscription_active", "bundle_buyer", "repeat_buyer", "high_intent"]) {
          tag
          hasTag
        }
      }
    }
    lines {
      id
      quantity
      sellingPlanAllocation {
        sellingPlan {
          id
        }
      }
      cost {
        amountPerQuantity {
          amount
        }
      }
      merchandise {
        __typename
        ... on ProductVariant {
          id
          product {
            id
          }
        }
      }
    }
  }
  localization {
    country {
      isoCode
    }
    market {
      id
    }
  }
  discount {
    discountClasses
    # automatic discount owner: syncCartLinesAutomaticDiscountMetafield + shipping discount sync
    # 分片：每个 class 的 offers 切成 offers + offers-1（各 <10KB），运行时合并。
    # ⚠️ key 列表必须与 offerPayload.server.ts 的 OFFER_SHARD_KEYS 一致。
    offersFromDiscountOwner: metafield(namespace: "$app:ciwi_bundle", key: "offers") {
      jsonValue
    }
    offersShard1: metafield(namespace: "$app:ciwi_bundle", key: "offers-1") {
      jsonValue
    }
  }
}
