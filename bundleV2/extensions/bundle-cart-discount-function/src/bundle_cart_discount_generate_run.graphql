query CartInput {
  cart {
    lines {
      id
      quantity
      offerIdAttr: attribute(key: "__ciwi_bundle_offer_id") {
        value
      }
      offerIdLegacyAttr: attribute(key: "_ciwi_bundle_offer_id") {
        value
      }
      abGroupAttr: attribute(key: "__ciwi_ab_group") {
        value
      }
      abGroupLegacyAttr: attribute(key: "_ciwi_ab_group") {
        value
      }
      abBucketAttr: attribute(key: "__ciwi_ab_bucket") {
        value
      }
      abBucketLegacyAttr: attribute(key: "_ciwi_ab_bucket") {
        value
      }
      cost {
        amountPerQuantity {
          amount
        }
        compareAtAmountPerQuantity {
          amount
        }
        subtotalAmount {
          amount
        }
      }
      merchandise {
        __typename
        ... on ProductVariant {
          id
          product {
            id
          }
        }
      }
    }
  }
  shop {
    metafield(namespace: "ciwi_bundle", key: "ciwi-bundle-offers") {
      jsonValue
      value
      type
    }
  }
  localization {
    market {
      id
    }
  }
  discount {
    appOwnedOffers: metafield(namespace: "$app:ciwi_bundle", key: "offers") {
      jsonValue
      value
      type
    }
    defaultAppOffers: metafield(key: "offers") {
      jsonValue
      value
      type
    }
    legacyOffers: metafield(namespace: "ciwi_bundle", key: "ciwi-bundle-offers") {
      jsonValue
      value
      type
    }
    discountClasses
  }
}
