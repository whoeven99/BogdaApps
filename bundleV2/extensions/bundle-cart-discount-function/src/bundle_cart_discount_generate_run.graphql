query CartInput {
  cart {
    lines {
      id
      quantity
      cost {
        amountPerQuantity {
          amount
        }
      }
      merchandise {
        __typename
        ... on ProductVariant {
          id
          product {
            id
          }
        }
      }
    }
  }
  shop {
    metafield(namespace: "ciwi_bundle", key: "ciwi-bundle-offers") {
      jsonValue
      value
      type
    }
    offersProd: metafield(namespace: "ciwi_bundle", key: "ciwi-bundle-offers-prod") {
      jsonValue
      value
      type
    }
    offersTest: metafield(namespace: "ciwi_bundle", key: "ciwi-bundle-offers-test") {
      jsonValue
      value
      type
    }
    offersActiveEnv: metafield(namespace: "ciwi_bundle", key: "ciwi-bundle-offers-active-env") {
      jsonValue
      value
      type
    }
    bundleEnabledProd: metafield(namespace: "ciwi_bundle", key: "ciwi-bundle-enabled-prod") {
      jsonValue
      value
      type
    }
    bundleEnabledTest: metafield(namespace: "ciwi_bundle", key: "ciwi-bundle-enabled-test") {
      jsonValue
      value
      type
    }
  }
  localization {
    market {
      id
    }
  }
  discount {
    discountClasses
  }
}
