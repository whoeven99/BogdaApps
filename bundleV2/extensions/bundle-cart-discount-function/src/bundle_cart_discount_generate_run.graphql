query CartInput {
  triggeringDiscountCode
  cart {
    buyerIdentity {
      isAuthenticated
      customer {
        numberOfOrders
        amountSpent {
          amount
        }
        hasTags(tags: ["vip", "high_aov", "subscription_active", "bundle_buyer", "repeat_buyer", "high_intent"]) {
          tag
          hasTag
        }
      }
    }
    lines {
      id
      quantity
      sellingPlanAllocation {
        sellingPlan {
          id
        }
      }
      cost {
        amountPerQuantity {
          amount
        }
      }
      merchandise {
        __typename
        ... on ProductVariant {
          id
          product {
            id
          }
        }
      }
    }
  }
  shop {
    bundleEnabledShop: metafield(namespace: "ciwi_bundle", key: "ciwi-bundle-enabled") {
      jsonValue
    }
    offersShop: metafield(namespace: "ciwi_bundle", key: "ciwi-bundle-offers-fn") {
      jsonValue
    }
  }
  localization {
    country {
      isoCode
    }
    market {
      id
    }
  }
  discount {
    discountClasses
    # automatic discount owner: syncCartLinesAutomaticDiscountMetafield + shipping discount sync
    offersFromDiscountOwner: metafield(namespace: "$app:ciwi_bundle", key: "offers") {
      jsonValue
    }
  }
}
