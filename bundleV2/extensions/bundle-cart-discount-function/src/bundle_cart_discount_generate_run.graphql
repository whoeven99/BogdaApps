query CartInput {
  cart {
    lines {
      id
      quantity
      cost {
        amountPerQuantity {
          amount
        }
      }
      merchandise {
        __typename
        ... on ProductVariant {
          id
          product {
            id
          }
        }
      }
    }
  }
  shop {
    metafield(namespace: "ciwi_bundle", key: "ciwi-bundle-offers") {
      jsonValue
      value
      type
    }
  }
  localization {
    market {
      id
    }
  }
  discount {
    metafield(namespace: "$app:ciwi_bundle", key: "offers") {
      jsonValue
      value
      type
    }
    discountClasses
  }
}
