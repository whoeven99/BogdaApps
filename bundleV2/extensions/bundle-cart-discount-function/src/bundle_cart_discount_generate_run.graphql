query CartInput {
  cart {
    lines {
      id
      quantity
      cost {
        amountPerQuantity {
          amount
        }
      }
      merchandise {
        __typename
        ... on ProductVariant {
          id
          product {
            id
          }
        }
      }
    }
  }
  shop {
    bundleEnabledShop: metafield(namespace: "ciwi_bundle", key: "ciwi-bundle-enabled") {
      jsonValue
    }
    offersShop: metafield(namespace: "ciwi_bundle", key: "ciwi-bundle-offers-fn") {
      jsonValue
    }
  }
  localization {
    market {
      id
    }
  }
  discount {
    discountClasses
  }
}
