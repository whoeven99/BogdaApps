query CartInput {
  cart {
    cost {
      subtotalAmount {
        amount
      }
    }
    lines {
      id
      quantity
      cost {
        amountPerQuantity {
          amount
        }
      }
      merchandise {
        __typename
        ... on ProductVariant {
          id
          product {
            id
          }
        }
      }
    }
  }
  shop {
    offersProd: metafield(namespace: "ciwi_bundle", key: "ciwi-bundle-offers-prod") {
      jsonValue
    }
    offersTest: metafield(namespace: "ciwi_bundle", key: "ciwi-bundle-offers-test") {
      jsonValue
    }
    bundleEnabledProd: metafield(namespace: "ciwi_bundle", key: "ciwi-bundle-enabled-prod") {
      jsonValue
    }
    bundleEnabledTest: metafield(namespace: "ciwi_bundle", key: "ciwi-bundle-enabled-test") {
      jsonValue
    }
  }
  localization {
    market {
      id
    }
  }
  discount {
    appOwnedOffers: metafield(namespace: "$app:ciwi_bundle", key: "offers") {
      jsonValue
    }
    legacyOffers: metafield(namespace: "ciwi_bundle", key: "ciwi-bundle-offers") {
      jsonValue
    }
    discountClasses
  }
}
